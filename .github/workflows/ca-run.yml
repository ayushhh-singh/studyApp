name: Scheduled — Current affairs pipeline

# Free-tier (₹0 stack) replacement for the `neev-ca-run` Render Cron Job
# defined in render.yaml (kept there, unused, as the paid upgrade path — see
# docs/operations.md's "Upgrading to paid" section). Runs `pnpm ca:run`
# directly on a GitHub-hosted runner instead of a Render container.
#
# GitHub Actions schedule triggers are BEST-EFFORT — expect several minutes
# of drift under GitHub-wide load, never treat this as a precise clock. A
# schedule is also automatically disabled after 60 days with no activity on
# the repo (any push/commit resets that clock) — if this silently stops
# firing, that's almost certainly why; re-enable it from the Actions tab or
# just push a commit.
on:
  schedule:
    # Every 6h, matching the dev scheduler's cadence (src/ca/scheduler.ts) and
    # render.yaml's neev-ca-run job.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # No cancel-in-progress: a slow run finishes rather than getting killed
  # mid-write; the next scheduled tick queues behind it instead of running
  # concurrently over the same rows.
  group: ca-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Was 15 — too tight in practice. Every candidate item (kept AND
    # archived) costs a sequential triage LLM call, and every kept item adds
    # an enrich call plus MCQ/mains-question generation; with max-per-source
    # x 6 sources that can be 100+ sequential Claude/OpenAI round trips in
    # one run. GitHub was hard-cancelling the job mid-run at 15m (confirmed
    # live: a run showed "cancelled ... in 15m 15s"), meaning any sources
    # later in CA_SOURCES than wherever the clock ran out were silently
    # starved every single run. 40 gives real headroom without risking a
    # genuinely-stuck run burning the whole budget unnoticed.
    # +10 on top of that for the ca:embed step below — normally seconds (a
    # no-op when there's no gap), but a large backlog batch under a loaded
    # HNSW index has been observed taking several minutes with retries.
    #
    # Since 2026-07-23 ca:run defaults to submit-now/collect-later triage
    # (Message Batches API, 50% off — see ca/pipeline.ts), so per-run wall time
    # should DROP: the biggest block of sequential calls (one triage per
    # candidate item, kept AND archived) is off the critical path entirely. A
    # run now does at most one collect (enrich + quiz generation for the
    # PREVIOUS run's batch) plus one non-blocking submit. The generous timeout
    # is deliberately left as-is — it is headroom, not a target, and the collect
    # phase is still the sequential enrich/MCQ/mains-question work it always was.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (api + its workspace deps only)
        run: pnpm install --frozen-lockfile --filter api...

      - name: Run ca:run
        run: pnpm --filter api ca:run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # ca:run's own inline embed step only LOGS a failure and never retries
      # (see pipeline.ts) — this closes any item that slipped through that
      # silent path, plus anything approved via the Review Queue since the
      # last run. --missing-only is cheap: it's a no-op unless there's a
      # real gap. See CLAUDE.md's "Embeddings MUST stay in sync" rule.
      # `if: !cancelled()` — ca:run processes items one at a time (a single
      # item's failure is already caught and skipped inside the pipeline, see
      # its "ITEM FAILED, skipping" log), so a partial/crashed ca:run can
      # still have committed several published items before failing. Without
      # this, the default GitHub Actions behavior (stop at the first failed
      # step) would skip this backfill entirely on any ca:run hiccup, leaving
      # whatever DID get published sitting un-embedded until the next
      # scheduled run picks it up. Runs unless the workflow itself was
      # explicitly cancelled (not just "the previous step failed").
      - name: Run ca:embed (backfill any item ca:run's inline embed missed)
        if: ${{ !cancelled() }}
        run: pnpm --filter api ca:embed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
