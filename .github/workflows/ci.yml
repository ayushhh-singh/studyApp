name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Fast, dependency-free guard: fail before install if any committed file
      # carries a hardcoded machine-specific absolute path (a /Users or /home
      # home dir, a Windows drive path, etc). See docs/operations.md → "Portability guard".
      - name: Portability guard (no hardcoded local paths)
        run: node scripts/check-portable-paths.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter api typecheck

      - name: Typecheck + build web
        run: pnpm --filter web build

      - name: Lint web
        run: pnpm --filter web lint

      - name: Build API (tsc, catches emit-time errors alongside typecheck)
        run: pnpm --filter api build
