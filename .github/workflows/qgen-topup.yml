name: Scheduled — Question generation top-up

# Free-tier (₹0 stack) replacement for the `neev-qgen-topup` Render Cron
# Job in render.yaml (kept there, unused, as the paid upgrade path — see
# docs/operations.md's "Upgrading to paid" section). This is the one job with
# real per-run LLM spend, capped by QGEN_BATCH_MAX_USD.
#
# GitHub Actions schedule triggers are BEST-EFFORT (minutes of drift is
# normal) and are auto-disabled after 60 days of repo inactivity — any
# push/commit resets that clock.
#
# TIMEOUT NOTE: `qgen:topup` submits an Anthropic Message Batch and POLLS
# for it to finish (src/lib/anthropic.ts's `runBatch`, 15s cadence, its own
# internal ~26h giveup ceiling since Anthropic's batch SLA is "ends within
# 24h") — this is NOT a quick request/response call like the other four
# scheduled jobs. Real batches at this app's size complete in low minutes
# per the code's own comment, but the timeout below is set generously (well
# past normal completion, well short of GitHub's own hard 360min/6h per-job
# cap) rather than tightly, so an unusually slow Anthropic day fails loudly
# with a clear Actions-tab signal instead of silently eating the full 6h.
on:
  schedule:
    # 21:30 UTC (previous day) = 03:00 IST — matches render.yaml's
    # neev-qgen-topup job exactly (off-peak, away from ca:run/daily:build).
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: qgen-topup
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (api + its workspace deps only)
        run: pnpm install --frozen-lockfile --filter api...

      - name: Run qgen:topup (submits + polls an Anthropic Message Batch — see the timeout note above)
        run: pnpm --filter api qgen:topup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Falls back to render.yaml's own default (5) if the repo secret is unset.
          QGEN_BATCH_MAX_USD: ${{ secrets.QGEN_BATCH_MAX_USD || '5' }}
