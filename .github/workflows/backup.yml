name: Scheduled — Weekly encrypted DB backup

# Weekly pg_dump of the Supabase project, GPG-encrypted before it ever
# touches disk as an artifact. This is new — there was no backup workflow
# before the ₹0-stack pass (Supabase's own point-in-time backups, mentioned
# in docs/operations.md's manual setup steps, are the primary safety net;
# this is a cheap independent second copy).
#
# IMPORTANT — GitHub-hosted runners do NOT have reliable outbound IPv6, and
# Supabase's *direct* connection host (db.<ref>.supabase.co, used elsewhere
# in this repo for `supabase db push` — see the supabase-headless-migrations
# memory) is IPv6-only. Using that host here will hang/time out. SUPABASE_DB_URL
# MUST be the **Session pooler** connection string instead (IPv4, and unlike
# the Transaction pooler it supports the multi-statement session pg_dump
# needs) — copy it verbatim from Supabase Dashboard → Project Settings →
# Database → Connection string → "Session pooler", with the real password
# substituted in, and store that whole string as the SUPABASE_DB_URL secret.
#
# NEVER upload an unencrypted dump — Actions artifacts are downloadable by
# anyone with repo read access (and this repo may not always stay private).
#
# Scoped to the `public` schema (+ the pgcrypto/vector extensions it
# depends on) — deliberately excludes auth.users/storage/other
# Supabase-internal schemas. See the "Dump database" step's own comment for
# why, and for what the restore target needs.
on:
  schedule:
    # Sundays, 03:00 UTC. Backup timing doesn't need to track IST like the
    # user-facing jobs — this just needs to run once a week off-peak.
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Compute backup date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Ubuntu's default apt repo ships whichever postgresql-client version
      # matches the Ubuntu release, which can be OLDER than the Supabase
      # project's Postgres server — pg_dump refuses to run against a NEWER
      # server ("server version mismatch"). Supabase upgrades their Postgres
      # major version periodically (this project is currently on 17.6), so
      # this step deliberately does NOT hardcode a client major version: it
      # installs from the official PGDG apt repo and
      # resolves whichever postgresql-client-NN package is the HIGHEST
      # available there at run time. PGDG always keeps that at or ahead of
      # every actively-supported Postgres major, and pg_dump can always dump
      # an OLDER server than itself (never a newer one), so "latest
      # available" is always the safe choice here — this exact mismatch
      # will otherwise recur every time Supabase bumps their major version.
      #
      # FIX NOTE (confirmed in a live Actions run): a hardcoded
      # `postgresql-client-17` here still resulted in pg_dump 16.14 running
      # in the next step and aborting against the 17.6 server with "server
      # version mismatch". Root cause: GitHub's hosted runner images ship
      # their own preinstalled postgresql-client (older, matching the
      # runner's own Ubuntu release), and depending on how THAT package
      # registered itself, it can still win bare `pg_dump` PATH resolution
      # over the one this step installs — update-alternatives isn't
      # guaranteed to be the only thing on PATH ahead of it. So this step
      # also records the resolved major version as a step output, and the
      # "Dump database" step below invokes pg_dump by its FULL versioned
      # path (/usr/lib/postgresql/<major>/bin/pg_dump) instead of the bare
      # `pg_dump` on PATH, removing that ambiguity entirely.
      - name: Install PostgreSQL client (latest available, via the official PGDG apt repo)
        id: pg_client
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          pkg="$(apt-cache search -n '^postgresql-client-[0-9]+$' \
            | grep -oE '^postgresql-client-[0-9]+' | sort -t- -k3 -n | tail -1)"
          major="${pkg##*-}"
          echo "Installing $pkg (PGDG's newest available major version)"
          sudo apt-get install -y "$pkg"
          "/usr/lib/postgresql/$major/bin/pg_dump" --version
          echo "major=$major" >> "$GITHUB_OUTPUT"

      # Scoped to --schema=public: an unscoped pg_dump of a Supabase project
      # also captures auth.users (real emails + hashed passwords), storage
      # object metadata, and other Supabase-internal schemas — none of which
      # this app owns or needs a second copy of (Supabase's own point-in-time
      # backups already cover them), and encrypting the artifact doesn't
      # justify collecting more of that data than necessary in the first
      # place. --extension is required alongside --schema: verified live
      # (Docker, pg_dump 17.10) that --schema=public ALONE silently drops the
      # `CREATE EXTENSION` statements for pgcrypto/vector (both installed in
      # the `extensions` schema per supabase/migrations/0001_extensions.sql,
      # and referenced by public-schema columns/defaults) even when
      # `--schema=extensions` is also passed — pg_dump's schema filter
      # excludes extensions from a selective dump unless named explicitly via
      # --extension. Restore target must already have the `extensions`
      # SCHEMA present (true of any real Supabase project) — verified live
      # that pg_restore then recreates the extensions themselves from the
      # dump's own CREATE EXTENSION statements, no manual step needed.
      - name: Dump database
        run: |
          "/usr/lib/postgresql/${{ steps.pg_client.outputs.major }}/bin/pg_dump" \
            "$SUPABASE_DB_URL" --no-owner --no-privileges --format=custom \
            --schema=public --extension=pgcrypto --extension=vector \
            --file=backup.pgdump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Encrypt dump
        run: |
          gpg --symmetric --batch --yes --cipher-algo AES256 \
            --passphrase "$BACKUP_PASSPHRASE" \
            -o backup.pgdump.gpg backup.pgdump
          rm -f backup.pgdump
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}

      - uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.date.outputs.date }}
          path: backup.pgdump.gpg
          retention-days: 90
          if-no-files-found: error
