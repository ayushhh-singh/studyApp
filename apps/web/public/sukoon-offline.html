<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're offline — Sukoon</title>
    <link rel="icon" type="image/svg+xml" href="/sukoon-mark.svg" />
    <style>
      body {
        margin: 0;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4ede3;
        color: #2e2a5e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 16px 0 8px;
      }
      p {
        color: #6b6580;
        font-size: 0.9rem;
        line-height: 1.6;
        margin: 0 0 20px;
      }
      p.hi {
        font-family: "Noto Sans Devanagari", sans-serif;
      }
      button {
        background: #2e2a5e;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 10px 20px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
      svg {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="17" fill="none" stroke="#2E2A5E" stroke-width="2.5" opacity="0.35" />
        <circle cx="20" cy="20" r="11.5" fill="none" stroke="#2E2A5E" stroke-width="2.5" opacity="0.6" />
        <circle cx="20" cy="20" r="6" fill="#4FB3A9" />
      </svg>
      <h1>You're offline</h1>
      <p>No connection right now — anything you already opened still works. Reconnect to sync and keep going.</p>
      <p class="hi">इंटरनेट कनेक्शन नहीं है — जो पहले खोला गया है वह अब भी काम करेगा। दोबारा जुड़ने पर सिंक हो जाएगा।</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
