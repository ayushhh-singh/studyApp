# PrayasUP — content acquisition source list
# ---------------------------------------------------------------------------
# Every URL under `verified:` was fetched and confirmed to serve a real PDF
# (%PDF magic bytes / Content-Type: application/pdf) before being added.
# `pnpm content:fetch` reads this file and downloads each source to
# content-raw/<section>/<id>.pdf. See docs/content-pipeline.md.
#
# Entry shape:
#   id       unique slug -> content-raw/<section>/<id>.pdf
#   section  syllabus | pyq_prelims | pyq_mains | answer_key
#   url      direct PDF URL (verified)
#   lang     hi | en | both
#   year     (optional)
#   paper    (optional) label, e.g. prelims_gs1, csat, gs1..gs6, essay, general_hindi
#   notes    (optional)
#   # session-gated ASP.NET (uppsc.up.nic.in) sources also carry:
#   needs_cookie / warmup / referer
#
# Government domains (uppsc.up.nic.in) are primary + authoritative. Coaching
# mirrors (Drishti IAS) are included only as resilient fallbacks / clean copies
# and are marked domain_is_government: false.
# ---------------------------------------------------------------------------

verified:
  # ===================== SYLLABUS (current / reformed) =====================
  # Official 2026 detailed advertisement (ADVT A-1/E-1/2026). One bilingual-ish
  # PDF per language covers Prelims (GS-I + CSAT, Appendix-3) and the reformed
  # Mains — General Hindi, Essay, GS I-VI incl. UP-specific GS-V/VI (Appendix-4).
  # View_Enclosure.aspx 302s to the homepage without a session cookie.
  - id: uppsc_syllabus_2026_en
    section: syllabus
    url: https://uppsc.up.nic.in/OuterPages/View_Enclosure.aspx?ID=114&flag=E&FID=929
    lang: en
    paper: all
    notes: Official 2026 advt; Prelims GS-I+CSAT & reformed Mains 8 papers incl UP GS-V/VI.
    needs_cookie: true
    warmup: https://uppsc.up.nic.in/Default.aspx
    referer: https://uppsc.up.nic.in/Default.aspx
  - id: uppsc_syllabus_2026_hi
    section: syllabus
