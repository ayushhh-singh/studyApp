  # =============== HANDWRITING SAMPLES (Answer-Writing OCR smoke test) ===============
  # Public-domain Devanagari manuscript pages from Wikimedia Commons, used ONLY to
  # smoke-test the handwritten-mode OCR pipeline (upload -> transcribe -> confirm ->
  # evaluate) without needing a real handwriting photo. Verified direct
  # upload.wikimedia.org JPEG URLs (checked for real image bytes + license before
  # being added here) — see apps/api/src/services/ocr/index.ts and CLAUDE.md.
  - id: handwriting_sample_rigveda
    section: handwriting_samples
    url: https://upload.wikimedia.org/wikipedia/commons/5/50/1500-1200_BCE%2C_Rigveda_manuscript_page_sample_iii%2C_Sanskrit%2C_Devanagari.jpg
    lang: hi
    notes: >-
      Wikimedia Commons, CC BY-SA 4.0 (photo) / PD-Art (pre-1923 underlying text).
      Rigveda manuscript page, Devanagari, Lalchand Research Library.
  - id: handwriting_sample_indian_manuscript
    section: handwriting_samples
    url: https://upload.wikimedia.org/wikipedia/commons/9/98/Indian_manuscript%2C_Devanagari_script_on_paper.jpg
    lang: hi
