    lang: hi
    paper: all
    notes: Official 2026 advt (Hindi); same structure as EN.
    needs_cookie: true
    warmup: https://uppsc.up.nic.in/Default.aspx
    referer: https://uppsc.up.nic.in/Default.aspx
