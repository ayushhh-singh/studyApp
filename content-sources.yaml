# Neev — content acquisition source list
# ---------------------------------------------------------------------------
# Every URL under `verified:` was fetched and confirmed to serve a real PDF
# (%PDF magic bytes / Content-Type: application/pdf) before being added.
# `pnpm content:fetch` reads this file and downloads each source to
# content-raw/<section>/<id>.pdf. See docs/content-pipeline.md.
#
# SOURCE TIERS (enforced by the fetcher — not left to memory):
#   tier: A   Official / government (upsc.gov.in, uppsc.up.nic.in, gov archives,
#             public-domain Wikimedia). AUTO-APPROVED — fetched unconditionally.
#   tier: B   Third-party COMPILATION of official papers (coaching mirrors that
#             republish real exam papers/keys). Requires `approved: true`, which
#             ONLY the human sets, after the source is first listed under
#             `needs_my_approval` with its URL + which official source is missing.
#             A tier-B entry without `approved: true` is SKIPPED, never fetched.
#   There is NO tier C: coaching mock/test-series questions, their solutions,
#             notes, or paywalled material are never listed, fetched, or parsed.
#
# The parser also enforces Tier-B EXTRACTION rules (apps/api/src/ingest/pyq.ts):
# only items with a specific (exam, year) attribution are taken; only
# stem+options+answer (never the compiler's explanations/solutions); and every
# loaded row records source_kind (official|compilation) + source_ref.
#
# Entry shape:
#   id       unique slug -> content-raw/<section>/<id>.pdf
#   section  syllabus | pyq_prelims | pyq_mains | answer_key | handwriting_samples
#   tier     A | B   (required)
#   approved true    (required for tier B; only the human sets it)
#   url      direct PDF URL (verified)
#   exam     (optional) uppsc | upsc | up_ro_aro | upsssc_pet  (else derived from id prefix)
#   lang     hi | en | both
#   year / paper / notes            (optional)
#   needs_cookie / warmup / referer (session-gated ASP.NET sources)
# ---------------------------------------------------------------------------

verified:
